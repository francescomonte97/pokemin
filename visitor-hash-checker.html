<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visitor ID Verifier</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111827;
      color: #f9fafb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(92vw, 560px);
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.35);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }
    p {
      margin: 0 0 18px;
      color: #cbd5e1;
      line-height: 1.5;
    }
    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: 700;
      color: #e5e7eb;
    }
    input, textarea, button {
      box-sizing: border-box;
      width: 100%;
      border-radius: 8px;
      border: 1px solid #4b5563;
      background: #111827;
      color: #f9fafb;
      padding: 10px 12px;
      font: inherit;
    }
    textarea {
      min-height: 88px;
      resize: vertical;
      word-break: break-all;
    }
    button {
      margin-top: 18px;
      border-color: #facc15;
      background: #facc15;
      color: #181410;
      font-weight: 800;
      cursor: pointer;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }
    .secondary {
      width: auto;
      border-color: #4b5563;
      background: #374151;
      color: #f9fafb;
    }
    output {
      display: block;
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      background: #111827;
      border: 1px solid #374151;
      color: #cbd5e1;
      word-break: break-all;
      white-space: pre-wrap;
    }
    .ok { color: #86efac; }
    .bad { color: #fca5a5; }
  </style>
</head>
<body>
  <main>
    <h1>Visitor ID Verifier</h1>
    <p>
      Un visitorId SHA-256 non contiene un IP decodificabile. Questo strumento
      verifica se un IP conosciuto, combinato con il salt privato, corrisponde
      al visitorId indicato. I dati restano nel browser.
    </p>

    <label for="ip">IP da verificare</label>
    <input id="ip" autocomplete="off" spellcheck="false" placeholder="es. 203.0.113.42">

    <label for="salt">IP_HASH_SALT privato</label>
    <input id="salt" type="password" autocomplete="off" spellcheck="false" placeholder="incolla qui il salt Cloudflare">

    <label for="hash">visitorId / hash Firestore</label>
    <textarea id="hash" autocomplete="off" spellcheck="false" placeholder="incolla qui il visitorId"></textarea>

    <div class="actions">
      <button id="check" type="button">Verifica corrispondenza</button>
      <button id="clear" class="secondary" type="button">Pulisci</button>
    </div>
    <output id="result">In attesa...</output>
  </main>

  <script src="visitor-hash-checker.js"></script>
</body>
</html>
