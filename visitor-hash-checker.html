<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visitor Hash Checker</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111827;
      color: #f9fafb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(92vw, 560px);
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.35);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }
    p {
      margin: 0 0 18px;
      color: #cbd5e1;
      line-height: 1.5;
    }
    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: 700;
      color: #e5e7eb;
    }
    input, textarea, button {
      box-sizing: border-box;
      width: 100%;
      border-radius: 8px;
      border: 1px solid #4b5563;
      background: #111827;
      color: #f9fafb;
      padding: 10px 12px;
      font: inherit;
    }
    textarea {
      min-height: 88px;
      resize: vertical;
      word-break: break-all;
    }
    button {
      margin-top: 18px;
      border-color: #facc15;
      background: #facc15;
      color: #181410;
      font-weight: 800;
      cursor: pointer;
    }
    output {
      display: block;
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      background: #111827;
      border: 1px solid #374151;
      color: #cbd5e1;
      word-break: break-all;
      white-space: pre-wrap;
    }
    .ok { color: #86efac; }
    .bad { color: #fca5a5; }
  </style>
</head>
<body>
  <main>
    <h1>Visitor Hash Checker</h1>
    <p>
      SHA-256 non si puo invertire. Questo tool verifica solo se un IP noto,
      combinato con il tuo salt privato, produce lo stesso visitorId.
    </p>

    <label for="ip">IP da verificare</label>
    <input id="ip" placeholder="es. 203.0.113.42">

    <label for="salt">IP_HASH_SALT privato</label>
    <input id="salt" type="password" placeholder="incolla qui il salt Cloudflare">

    <label for="hash">visitorId / hash Firestore</label>
    <textarea id="hash" placeholder="incolla qui il visitorId"></textarea>

    <button id="check">Verifica</button>
    <output id="result">In attesa...</output>
  </main>

  <script>
    async function sha256Hex(text) {
      const data = new TextEncoder().encode(text);
      const buffer = await crypto.subtle.digest('SHA-256', data);
      return [...new Uint8Array(buffer)]
        .map(byte => byte.toString(16).padStart(2, '0'))
        .join('');
    }

    document.getElementById('check').addEventListener('click', async () => {
      const ip = document.getElementById('ip').value.trim();
      const salt = document.getElementById('salt').value;
      const expected = document.getElementById('hash').value.trim().toLowerCase();
      const result = document.getElementById('result');

      if (!ip || !salt || !expected) {
        result.className = 'bad';
        result.textContent = 'Compila IP, salt e hash.';
        return;
      }

      const actual = await sha256Hex(`${ip}:${salt}`);
      const match = actual === expected;
      result.className = match ? 'ok' : 'bad';
      result.textContent = `${match ? 'MATCH' : 'NO MATCH'}\n\nCalcolato:\n${actual}`;
    });
  </script>
</body>
</html>
