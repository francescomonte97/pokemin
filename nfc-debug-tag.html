<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <title>Pokelike NFC Debug Tag</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1016;
      --panel: #141c25;
      --field: #090d12;
      --line: #3a4d61;
      --text: #f4f7fb;
      --muted: #a9b6c5;
      --yellow: #ffd84a;
      --green: #69d58b;
      --red: #ff7c7c;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      padding: max(18px, env(safe-area-inset-top)) 16px
        max(18px, env(safe-area-inset-bottom));
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    main {
      width: min(100%, 620px);
      padding: 22px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 5px 5px 0 #000;
    }
    h1 { margin: 0 0 8px; color: var(--yellow); font-size: 25px; }
    p { margin: 0 0 18px; color: var(--muted); line-height: 1.55; }
    label { display: block; margin: 15px 0 7px; font-weight: 700; }
    input, textarea, button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 4px;
      font: inherit;
    }
    input, textarea {
      padding: 11px;
      background: var(--field);
      color: var(--text);
    }
    input { min-height: 44px; }
    textarea {
      min-height: 118px;
      resize: vertical;
      overflow-wrap: anywhere;
    }
    button {
      min-height: 44px;
      padding: 10px 12px;
      cursor: pointer;
      background: #253344;
      color: var(--text);
      font-weight: 700;
    }
    button.primary {
      border-color: var(--yellow);
      background: var(--yellow);
      color: #181410;
    }
    button:disabled { cursor: not-allowed; opacity: .42; }
    .key-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }
    .key-row button { width: auto; min-width: 74px; }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-top: 12px;
    }
    .actions .wide { grid-column: 1 / -1; }
    output {
      display: block;
      min-height: 54px;
      margin-top: 16px;
      padding: 11px;
      border: 1px solid var(--line);
      background: var(--field);
      color: var(--muted);
      line-height: 1.5;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }
    output.ok { color: var(--green); border-color: var(--green); }
    output.error { color: var(--red); border-color: var(--red); }
    .note { margin: 14px 0 0; font-size: 12px; }
    @media (max-width: 480px) {
      main { padding: 17px; }
      .actions { grid-template-columns: 1fr; }
      .actions .wide { grid-column: auto; }
    }
  </style>
</head>
<body>
  <main>
    <h1>NFC Debug Tag</h1>
    <p>
      Verifica la chiave amministrativa, genera un token firmato dal Worker
      Reactiondex e scrivilo su un tag NFC.
    </p>

    <label for="admin-key">ADMIN_API_KEY</label>
    <div class="key-row">
      <input id="admin-key" type="password" autocomplete="off"
        placeholder="Incolla la chiave Cloudflare">
      <button id="toggle-key" type="button">Mostra</button>
    </div>

    <div class="actions">
      <button id="test-key" type="button">Test chiave</button>
      <button id="generate" type="button">Genera token</button>
    </div>

    <label for="tag-value">Token NFC firmato</label>
    <textarea id="tag-value" readonly spellcheck="false"
      placeholder="Il token comparirà qui dopo la generazione"></textarea>

    <div class="actions">
      <button id="copy-value" type="button">Copia token</button>
      <button id="verify" type="button">Verifica token</button>
      <button id="write" class="primary wide" type="button" disabled>
        Scrivi tag NFC
      </button>
    </div>

    <output id="status" aria-live="polite">Pronto.</output>
    <p class="note">
      La pagina richiede HTTPS e Chrome su Android per scrivere il tag.
      La chiave rimane solo nella sessione di questa scheda e non viene scritta
      sul tag NFC.
    </p>
  </main>

  <script>
    (() => {
      'use strict';

      const WORKER_URL =
        'https://proud-mouse-eb9f.reactiondex-rx.workers.dev';
      const keyInput = document.getElementById('admin-key');
      const tokenInput = document.getElementById('tag-value');
      const status = document.getElementById('status');
      const testButton = document.getElementById('test-key');
      const generateButton = document.getElementById('generate');
      const verifyButton = document.getElementById('verify');
      const writeButton = document.getElementById('write');

      keyInput.value = sessionStorage.getItem('pokelike_nfc_admin_key') || '';

      function setStatus(message, type = '') {
        status.className = type;
        status.textContent = message;
      }

      function normalizeKey() {
        let value = keyInput.value.trim();
        value = value.replace(/^Authorization:\s*Bearer\s+/i, '');
        value = value.replace(/^Bearer\s+/i, '');
        value = value.replace(/^['"]|['"]$/g, '').trim();
        keyInput.value = value;
        return value;
      }

      async function readResponse(response) {
        const text = await response.text();
        let data = {};
        try { data = text ? JSON.parse(text) : {}; } catch {}
        if (!response.ok) {
          throw new Error(data.error || `Errore Worker (${response.status})`);
        }
        return data;
      }

      async function createToken() {
        const key = normalizeKey();
        if (!key) throw new Error('Inserisci ADMIN_API_KEY.');

        const response = await fetch(`${WORKER_URL}/admin/debug-nfc/token`, {
          method: 'POST',
          mode: 'cors',
          cache: 'no-store',
          headers: {
            'Authorization': `Bearer ${key}`,
            'Content-Type': 'application/json'
          },
          body: '{}'
        });
        const data = await readResponse(response);
        if (!data.tagValue) throw new Error('Il Worker non ha restituito il token.');
        sessionStorage.setItem('pokelike_nfc_admin_key', key);
        return data.tagValue;
      }

      async function verifyToken(token) {
        const response = await fetch(`${WORKER_URL}/debug-nfc/verify`, {
          method: 'POST',
          mode: 'cors',
          cache: 'no-store',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tagValue: token })
        });
        const data = await readResponse(response);
        return data.valid === true;
      }

      async function generateAndVerify(showToken = true) {
        const token = await createToken();
        const valid = await verifyToken(token);
        if (!valid) throw new Error('Il token è stato generato ma non risulta valido.');
        if (showToken) tokenInput.value = token;
        writeButton.disabled = false;
        return token;
      }

      async function withBusy(buttons, task) {
        buttons.forEach(button => { button.disabled = true; });
        try {
          return await task();
        } finally {
          buttons.forEach(button => {
            button.disabled = button === writeButton && !tokenInput.value.trim();
          });
        }
      }

      document.getElementById('toggle-key').addEventListener('click', event => {
        const visible = keyInput.type === 'text';
        keyInput.type = visible ? 'password' : 'text';
        event.currentTarget.textContent = visible ? 'Mostra' : 'Nascondi';
      });

      testButton.addEventListener('click', () => withBusy(
        [testButton, generateButton, writeButton],
        async () => {
          setStatus('Verifica della chiave in corso...');
          await generateAndVerify(false);
          tokenInput.value = '';
          writeButton.disabled = true;
          setStatus('Chiave valida. Il Worker Reactiondex risponde correttamente.', 'ok');
        }
      ).catch(error => {
        setStatus(
          `${error.message}\nOrigine pagina: ${location.origin}\nWorker: ${WORKER_URL}`,
          'error'
        );
      }));

      generateButton.addEventListener('click', () => withBusy(
        [testButton, generateButton, writeButton],
        async () => {
          setStatus('Generazione e verifica del token...');
          await generateAndVerify(true);
          setStatus('Token valido e pronto per la scrittura.', 'ok');
        }
      ).catch(error => {
        tokenInput.value = '';
        writeButton.disabled = true;
        setStatus(error.message, 'error');
      }));

      verifyButton.addEventListener('click', async () => {
        const token = tokenInput.value.trim();
        if (!token) return setStatus('Genera prima un token.', 'error');
        verifyButton.disabled = true;
        try {
          setStatus('Verifica del token...');
          const valid = await verifyToken(token);
          writeButton.disabled = !valid;
          setStatus(
            valid ? 'Token valido.' : 'Token non valido o scaduto.',
            valid ? 'ok' : 'error'
          );
        } catch (error) {
          writeButton.disabled = true;
          setStatus(error.message, 'error');
        } finally {
          verifyButton.disabled = false;
        }
      });

      document.getElementById('copy-value').addEventListener('click', async () => {
        const token = tokenInput.value.trim();
        if (!token) return setStatus('Nessun token da copiare.', 'error');
        try {
          await navigator.clipboard.writeText(token);
          setStatus('Token copiato.', 'ok');
        } catch {
          tokenInput.select();
          document.execCommand('copy');
          setStatus('Token copiato.', 'ok');
        }
      });

      writeButton.addEventListener('click', async () => {
        const token = tokenInput.value.trim();
        if (!token) return setStatus('Genera prima un token.', 'error');
        if (!('NDEFReader' in window)) {
          return setStatus(
            'Web NFC non disponibile. Apri questa pagina HTTPS con Chrome su Android.',
            'error'
          );
        }

        writeButton.disabled = true;
        try {
          setStatus('Avvicina il tag NFC al telefono...');
          const writer = new NDEFReader();
          await writer.write({
            records: [{ recordType: 'text', data: token, lang: 'en' }]
          });
          setStatus('Tag NFC scritto correttamente.', 'ok');
        } catch (error) {
          setStatus(`Scrittura non riuscita: ${error.message || error}`, 'error');
        } finally {
          writeButton.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
