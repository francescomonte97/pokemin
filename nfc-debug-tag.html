<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Pokelike NFC Tag Writer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101319;
      --panel: #1a2029;
      --panel-2: #242c38;
      --border: #536175;
      --text: #f4f6f9;
      --muted: #aeb9c8;
      --accent: #f2cf45;
      --success: #69d58b;
      --danger: #ff7e7e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    main {
      width: min(100%, 620px);
      padding: 22px;
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: 5px 5px 0 #050608;
    }
    h1 {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: clamp(20px, 6vw, 30px);
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.55;
    }
    label {
      display: block;
      margin: 15px 0 7px;
      font-weight: 700;
    }
    textarea, button {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 4px;
      font: inherit;
    }
    textarea {
      min-height: 88px;
      resize: vertical;
      padding: 11px;
      background: #0d1117;
      color: var(--text);
      overflow-wrap: anywhere;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-top: 12px;
    }
    button {
      min-height: 43px;
      padding: 10px 12px;
      cursor: pointer;
      background: var(--panel-2);
      color: var(--text);
      font-weight: 700;
    }
    button.primary {
      grid-column: 1 / -1;
      border-color: var(--accent);
      background: var(--accent);
      color: #181410;
    }
    button:disabled { cursor: not-allowed; opacity: .45; }
    output {
      display: block;
      min-height: 48px;
      margin-top: 16px;
      padding: 11px;
      border: 1px solid var(--border);
      background: #0d1117;
      color: var(--muted);
      line-height: 1.5;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }
    output.ok { color: var(--success); border-color: var(--success); }
    output.error { color: var(--danger); border-color: var(--danger); }
    .note { margin-top: 14px; font-size: 12px; }
    @media (max-width: 480px) {
      main { padding: 18px; }
      .actions { grid-template-columns: 1fr; }
      button.primary { grid-column: auto; }
    }
  </style>
</head>
<body>
  <main>
    <h1>NFC Tag Writer</h1>
    <p>
      Genera un valore segreto, scrivilo su un tag NFC e conserva in Firestore
      soltanto il suo hash SHA-256.
    </p>

    <label for="tag-value">Valore del tag</label>
    <textarea id="tag-value" autocomplete="off" spellcheck="false"></textarea>

    <div class="actions">
      <button id="generate" type="button">Genera valore</button>
      <button id="copy-value" type="button">Copia valore</button>
      <button id="write" class="primary" type="button">Scrivi tag NFC</button>
    </div>

    <label for="tag-hash">Hash SHA-256 per Firestore</label>
    <textarea id="tag-hash" readonly></textarea>

    <div class="actions">
      <button id="copy-hash" type="button">Copia hash</button>
    </div>

    <output id="status" aria-live="polite">Pronto.</output>
    <p class="note">
      Richiede Chrome su Android, NFC attivo e una pagina servita tramite HTTPS.
      Il valore non viene inviato ad alcun server.
    </p>
  </main>

  <script>
    const valueInput = document.getElementById('tag-value');
    const hashOutput = document.getElementById('tag-hash');
    const status = document.getElementById('status');
    const writeButton = document.getElementById('write');

    function randomSecret() {
      const bytes = crypto.getRandomValues(new Uint8Array(24));
      const token = [...bytes]
        .map(byte => byte.toString(16).padStart(2, '0'))
        .join('');
      return `pokelike-debug:${token}`;
    }

    async function sha256Hex(value) {
      const data = new TextEncoder().encode(value.trim());
      const digest = await crypto.subtle.digest('SHA-256', data);
      return [...new Uint8Array(digest)]
        .map(byte => byte.toString(16).padStart(2, '0'))
        .join('');
    }

    async function refreshHash() {
      const value = valueInput.value.trim();
      hashOutput.value = value ? await sha256Hex(value) : '';
    }

    async function copyText(value, label) {
      if (!value) return;
      await navigator.clipboard.writeText(value);
      status.className = 'ok';
      status.textContent = `${label} copiato.`;
    }

    document.getElementById('generate').addEventListener('click', async () => {
      valueInput.value = randomSecret();
      await refreshHash();
      status.className = 'ok';
      status.textContent = 'Nuovo valore generato localmente.';
    });

    valueInput.addEventListener('input', refreshHash);
    document.getElementById('copy-value').addEventListener('click', () =>
      copyText(valueInput.value.trim(), 'Valore')
    );
    document.getElementById('copy-hash').addEventListener('click', () =>
      copyText(hashOutput.value, 'Hash')
    );

    writeButton.addEventListener('click', async () => {
      const value = valueInput.value.trim();
      if (!value) {
        status.className = 'error';
        status.textContent = 'Genera o inserisci prima un valore.';
        return;
      }
      if (!('NDEFReader' in window)) {
        status.className = 'error';
        status.textContent = 'Web NFC non disponibile. Usa Chrome su Android tramite HTTPS.';
        return;
      }

      writeButton.disabled = true;
      status.className = '';
      status.textContent = 'Avvicina il tag NFC al telefono...';
      try {
        const writer = new NDEFReader();
        await writer.write({
          records: [{
            recordType: 'text',
            data: value,
            lang: 'en'
          }]
        });
        await refreshHash();
        status.className = 'ok';
        status.textContent = 'Tag scritto correttamente. Aggiungi l’hash a nfcTagHashes in Firestore.';
      } catch (error) {
        status.className = 'error';
        status.textContent = `Scrittura non riuscita: ${error.message || error}`;
      } finally {
        writeButton.disabled = false;
      }
    });

    valueInput.value = randomSecret();
    refreshHash();
  </script>
</body>
</html>
