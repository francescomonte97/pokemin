plugins {
    id "com.android.application"
}

android {
    namespace "it.pokemin.app"
    compileSdk 36

    defaultConfig {
        applicationId "xyz.pokelike.app"
        minSdk 24
        targetSdk 36
        versionCode 18
        versionName "1.6"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}
